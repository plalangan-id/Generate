<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Billing App - PLALANGAN.NET</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="p-2 antialiased" x-data="billApp()" x-init="initData()">

    <nav class="mb-3 grid grid-cols-2 gap-2 bg-slate-800 p-1 rounded-lg border border-slate-700/60 shadow-sm">
        <button @click="switchTab('Sheet1')" 
                :class="currentSheet === 'Sheet1' ? 'bg-blue-600 text-white font-bold' : 'text-slate-400 hover:text-slate-200'"
                class="text-xs py-1.5 rounded transition-all uppercase tracking-wider text-center cursor-pointer">
            🌐 Tagihan WiFi
        </button>
        <button @click="switchTab('Sheet2')" 
                :class="currentSheet === 'Sheet2' ? 'bg-purple-600 text-white font-bold' : 'text-slate-400 hover:text-slate-200'"
                class="text-xs py-1.5 rounded transition-all uppercase tracking-wider text-center cursor-pointer">
            🏡 Iuran Kampung
        </button>
    </nav>

    <header class="mb-3 bg-slate-800 p-2.5 rounded-lg border border-slate-700 shadow-sm">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xs font-bold tracking-wide uppercase" 
                :class="currentSheet === 'Sheet1' ? 'text-emerald-400' : 'text-purple-400'"
                x-text="currentSheet === 'Sheet1' ? 'Rekap Billing WiFi' : 'Rekap Iuran Kampung'">
            </h1>
            <select x-model="selectedMonth" @change="loadBulan()" class="bg-slate-900 border border-slate-600 text-[11px] rounded px-1.5 py-0.5 text-slate-200 font-medium focus:outline-none">
                <option value="Januari">Januari</option>
                <option value="Februari">Februari</option>
                <option value="Maret">Maret</option>
                <option value="April">April</option>
                <option value="Mei">Mei</option>
                <option value="Juni">Juni</option>
                <option value="Juli">Juli</option>
                <option value="Agustus">Agustus</option>
                <option value="September">September</option>
                <option value="Oktober">Oktober</option>
                <option value="November">November</option>
                <option value="Desember">Desember</option>
            </select>
        </div>

        <div class="grid grid-cols-3 gap-1.5 text-[11px]">
            <div class="bg-slate-950 p-1.5 rounded border-l-2 border-emerald-500">
                <span class="text-slate-400 block text-[9px] uppercase font-semibold">Uang Masuk</span>
                <span class="font-bold text-emerald-400" x-text="formatRupiah(totalMasuk())">Rp 0</span>
            </div>
            <div class="bg-slate-950 p-1.5 rounded border-l-2 border-rose-500">
                <span class="text-slate-400 block text-[9px] uppercase font-semibold">Belum Bayar</span>
                <span class="font-bold text-rose-400" x-text="formatRupiah(totalBelum())">Rp 0</span>
            </div>
            <div class="bg-slate-950 p-1.5 rounded border-l-2 border-blue-500">
                <span class="text-slate-400 block text-[9px] uppercase font-semibold">Total Target</span>
                <span class="font-bold text-blue-400" x-text="formatRupiah(totalTarget())">Rp 0</span>
            </div>
        </div>
    </header>

    <div class="mb-2 flex gap-2 justify-between items-center bg-slate-800/50 p-2 rounded-lg border border-slate-700/60">
        <div class="flex gap-1.5 items-center">
            <button @click="filterStatus = 'semua'" :class="filterStatus === 'semua' ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'" class="text-[10px] font-semibold px-2 py-0.5 rounded transition cursor-pointer">Semua</button>
            <button @click="filterStatus = 'belum'" :class="filterStatus === 'belum' ? 'bg-rose-600 text-white border-rose-500' : 'bg-slate-700 text-slate-300'" class="text-[10px] font-semibold px-2 py-0.5 rounded transition flex items-center gap-1 cursor-pointer">
                Belum Bayar <span class="bg-slate-900/60 text-rose-300 px-1 rounded-sm text-[9px]" x-text="countBelum()">0</span>
            </button>
        </div>
        <button @click="generateMassal()" :disabled="loading" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold text-[10px] px-2.5 py-1 rounded shadow transition flex items-center gap-1 disabled:opacity-50 cursor-pointer">
            <span x-show="!loading">⚡ Reset Bulan Ini</span>
            <span x-show="loading">Proses...</span>
        </button>
    </div>

    <main class="bg-slate-800 rounded-lg border border-slate-700 shadow-md overflow-hidden mb-3">
        <div class="p-1.5 bg-slate-900/50 border-b border-slate-700">
            <input type="text" x-model="searchQuery" placeholder="Cari nama member..." class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500">
        </div>

        <div class="overflow-x-auto relative">
            <div x-show="loading" class="absolute inset-0 bg-slate-900/80 flex items-center justify-center text-xs text-emerald-400 font-semibold z-10">
                Memuat Data Google Sheets...
            </div>

            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900 text-slate-400 uppercase text-[9px] font-bold tracking-wider border-b border-slate-700">
                        <th class="py-1.5 px-2 text-center w-8">No</th>
                        <th class="py-1.5 px-2">Nama Member</th>
                        <th class="py-1.5 px-2 text-right">Tagihan</th>
                        <th class="py-1.5 px-2 text-center w-20">Status</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/40 text-xs">
                    <template x-for="(item, index) in filteredMembers()" :key="item.id + '_' + item.bulanTarget + '_' + currentSheet">
                        <tr class="hover:bg-slate-700/20 transition-colors" :class="item.lunas ? 'bg-emerald-950/10' : 'bg-rose-950/10'">
                            <td class="py-1 px-2 text-center text-slate-500 font-mono text-[11px]" x-text="index + 1"></td>
                            <td class="py-1 px-2 font-medium text-slate-200 truncate max-w-[140px]">
                                <span class="font-semibold" x-text="item.nama"></span>
                                <span x-show="searchQuery.trim() !== ''" class="inline-block bg-slate-950 text-amber-400 font-bold text-[9px] px-1 rounded ml-1 uppercase" x-text="item.bulanTarget"></span>
                                <span class="block text-[9px] text-slate-400 font-normal" x-text="item.paket"></span>
                            </td>
                            <td class="py-1 px-2 text-right font-mono text-[11px] text-slate-300 font-semibold" x-text="formatRupiah(item.lunas ? item.uangMasuk : item.tagihan)"></td>
                            <td class="py-1 px-2 text-center">
                                <button @click="toggleBayar(item)" 
                                        :disabled="item.lunas"
                                        :class="item.lunas ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30 opacity-75' : 'bg-rose-500/20 text-rose-400 border-rose-500/30 cursor-pointer active:scale-95'"
                                        class="w-full text-[10px] font-bold py-0.5 px-1 rounded border transition-all">
                                    <span x-text="item.lunas ? 'LUNAS' : 'BAYAR'"></span>
                                </button>
                            </td>
                        </tr>
                    </template>
                    <template x-if="filteredMembers().length === 0 && !loading">
                        <tr>
                            <td colspan="4" class="py-4 text-center text-xs text-slate-500 italic">Data tidak ditemukan.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <div id="additional-features" class="space-y-2">
        <button @click="printLaporanBukuTamu()" :disabled="loading || filteredMembers().length === 0" class="w-full bg-slate-700 hover:bg-slate-600 active:scale-98 text-slate-200 font-bold text-xs py-2 rounded-lg border border-slate-600 shadow transition flex items-center justify-center gap-1.5 disabled:opacity-50 cursor-pointer">
            🖨️ Cetak / Save PDF via Tab Baru (Anti-Blank)
        </button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyQyxZ2jNdxbs_A1KtgZfvp2tnbJU56jq_G_XvTyo_hFOwvZRyrlPjSMCbXzJaBmnv/exec";

        function billApp() {
            return {
                currentSheet: 'Sheet1', 
                selectedMonth: 'Mei', 
                filterStatus: 'semua',
                searchQuery: '',
                activeBills: [],
                loading: false,

                listBulan: ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"],

                initData() { this.loadBulan(); },
                switchTab(sheetName) {
                    this.currentSheet = sheetName;
                    this.searchQuery = '';
                    this.loadBulan();
                },

                async loadBulan() {
                    if(!WEB_APP_URL || WEB_APP_URL.includes("ISI_DENGAN_URL")) return;
                    this.loading = true;
                    try {
                        const response = await fetch(`${WEB_APP_URL}?bulan=semua&sheetName=${this.currentSheet}`);
                        this.activeBills = await response.json();
                    } catch (error) {
                        console.error("Gagal memuat data:", error);
                        this.activeBills = [];
                    } finally { this.loading = false; }
                },

                filteredMembers() {
                    let hasilRender = [];
                    if (this.searchQuery.trim() !== '') {
                        const query = this.searchQuery.toLowerCase();
                        this.activeBills.forEach(member => {
                            if (member.nama.toLowerCase().includes(query)) {
                                this.listBulan.forEach(bulan => {
                                    const uangMasuk = member.riwayatBulan[bulan] || 0;
                                    const isLunas = uangMasuk >= member.tagihan && member.tagihan > 0;
                                    const matchStatus = this.filterStatus === 'semua' || (this.filterStatus === 'belum' && !isLunas);
                                    if (matchStatus) {
                                        hasilRender.push({ id: member.id, nama: member.nama, paket: member.paket, tagihan: member.tagihan, uangMasuk: uangMasuk, lunas: isLunas, bulanTarget: bulan });
                                    }
                                });
                            }
                        });
                    } else {
                        this.activeBills.forEach(member => {
                            const uangMasuk = member.riwayatBulan[this.selectedMonth] || 0;
                            const isLunas = uangMasuk >= member.tagihan && member.tagihan > 0;
                            const matchStatus = this.filterStatus === 'semua' || (this.filterStatus === 'belum' && !isLunas);
                            if (matchStatus) {
                                hasilRender.push({ id: member.id, nama: member.nama, paket: member.paket, tagihan: member.tagihan, uangMasuk: uangMasuk, lunas: isLunas, bulanTarget: this.selectedMonth });
                            }
                        });
                    }
                    return hasilRender;
                },

                async toggleBayar(item) {
                    // PERUBAHAN: Kunci logika fungsi jika status item memang sudah lunas (mencegah klik balik)
                    if (item.lunas) return;

                    const statusTarget = !item.lunas;
                    item.lunas = statusTarget; 
                    item.uangMasuk = statusTarget ? item.tagihan : 0;
                    let memberAsli = this.activeBills.find(m => m.id === item.id);
                    if (memberAsli) { memberAsli.riwayatBulan[item.bulanTarget] = statusTarget ? item.tagihan : 0; }
                    try {
                        await fetch(WEB_APP_URL, {
                            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ aksi: "update_status", sheetName: this.currentSheet, id: item.id, bulan: item.bulanTarget, lunas: statusTarget })
                        });
                    } catch (error) { console.error("Gagal simpan data:", error); this.loadBulan(); }
                },

                async generateMassal() {
                    if (!confirm(`Reset data bulan ${this.selectedMonth}?`)) return;
                    this.loading = true;
                    try {
                        await fetch(WEB_APP_URL, {
                            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ aksi: "generate_massal", sheetName: this.currentSheet, bulan: this.selectedMonth })
                        });
                        setTimeout(() => this.loadBulan(), 1500);
                    } catch (error) { this.loading = false; }
                },

                printLaporanBukuTamu() {
                    const listData = this.filteredMembers();
                    const judulLaporan = this.currentSheet === 'Sheet1' ? 'LAPORAN TAGIHAN WIFI - PLALANGAN.NET' : 'LAPORAN IURAN BULANAN KAMPUNG';
                    
                    const dataKiri = listData.slice(0, 30);
                    const dataTengah = listData.slice(30, 60);
                    const dataKanan = listData.slice(60, 90);

                    const printWindow = window.open('', '_blank');
                    
                    let htmlContent = `
                    <html>
                    <head>
                        <title>Cetak Laporan</title>
                        <style>
                            @page { size: a4 landscape; margin: 0.25in; }
                            body { font-family: Arial, sans-serif; color: #000; background: #fff; margin: 0; padding: 0; font-size: 9.5px; }
                            .header { border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
                            .header h2 { margin: 0; padding: 0; font-size: 14px; text-transform: uppercase; }
                            .header p { margin: 2px 0 0 0; color: #444; font-size: 10px; }
                            
                            .grid-container { display: flex; gap: 15px; }
                            .kolom-tabel { flex: 1; }
                            
                            table { width: 100%; border-collapse: collapse; }
                            th, td { border: 1px solid #000; padding: 2.5px 4px; text-align: left; box-sizing: border-box; line-height: 1.2; }
                            th { background-color: #f2f2f2; font-weight: bold; font-size: 8.5px; text-transform: uppercase; }
                            .text-right { text-align: right; }
                            .text-center { text-align: center; }
                            .font-mono { font-family: monospace; }
                            .status-lunas { color: green; font-weight: bold; }
                            .status-belum { color: red; font-weight: bold; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <div>
                                <h2>${judulLaporan}</h2>
                                <p>Periode Bulan: <b>${this.selectedMonth} 2026</b> | Status Data: <b>${this.filterStatus.toUpperCase()}</b></p>
                            </div>
                            <div class="text-right font-mono" style="font-weight: bold; font-size: 10px; line-height: 1.3;">
                                <div>Total Masuk: ${this.formatRupiah(this.totalMasuk())}</div>
                                <div>Total Tunggakan: ${this.formatRupiah(this.totalBelum())}</div>
                            </div>
                        </div>

                        <div class="grid-container">
                            
                            <div class="kolom-tabel">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="text-center" style="width: 25px;">No</th>
                                            <th>Nama</th>
                                            <th class="text-right" style="width: 95px;">Jumlah</th>
                                            <th class="text-center" style="width: 55px;">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;
                                    
                                    dataKiri.forEach((item, index) => {
                                        const labelBulan = this.searchQuery.trim() !== '' ? ` (${item.bulanTarget})` : '';
                                        const txtStatus = item.lunas ? '<span class="status-lunas">LUNAS</span>' : '<span class="status-belum">BELUM</span>';
                                        htmlContent += `
                                        <tr>
                                            <td class="text-center font-mono">${index + 1}</td>
                                            <td><b>${item.nama}</b>${labelBulan}</td>
                                            <td class="text-right font-mono">${this.formatRupiah(item.lunas ? item.uangMasuk : item.tagihan)}</td>
                                            <td class="text-center">${txtStatus}</td>
                                        </tr>`;
                                    });

    htmlContent += `
                                    </tbody>
                                </table>
                            </div>

                            <div class="kolom-tabel">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="text-center" style="width: 25px;">No</th>
                                            <th>Nama</th>
                                            <th class="text-right" style="width: 95px;">Jumlah</th>
                                            <th class="text-center" style="width: 55px;">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;

                                    dataTengah.forEach((item, index) => {
                                        const labelBulan = this.searchQuery.trim() !== '' ? ` (${item.bulanTarget})` : '';
                                        const txtStatus = item.lunas ? '<span class="status-lunas">LUNAS</span>' : '<span class="status-belum">BELUM</span>';
                                        htmlContent += `
                                        <tr>
                                            <td class="text-center font-mono">${index + 31}</td>
                                            <td><b>${item.nama}</b>${labelBulan}</td>
                                            <td class="text-right font-mono">${this.formatRupiah(item.lunas ? item.uangMasuk : item.tagihan)}</td>
                                            <td class="text-center">${txtStatus}</td>
                                        </tr>`;
                                    });

    htmlContent += `
                                    </tbody>
                                </table>
                            </div>

                            <div class="kolom-tabel">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="text-center" style="width: 25px;">No</th>
                                            <th>Nama</th>
                                            <th class="text-right" style="width: 95px;">Jumlah</th>
                                            <th class="text-center" style="width: 55px;">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;

                                    dataKanan.forEach((item, index) => {
                                        const labelBulan = this.searchQuery.trim() !== '' ? ` (${item.bulanTarget})` : '';
                                        const txtStatus = item.lunas ? '<span class="status-lunas">LUNAS</span>' : '<span class="status-belum">BELUM</span>';
                                        htmlContent += `
                                        <tr>
                                            <td class="text-center font-mono">${index + 61}</td>
                                            <td><b>${item.nama}</b>${labelBulan}</td>
                                            <td class="text-right font-mono">${this.formatRupiah(item.lunas ? item.uangMasuk : item.tagihan)}</td>
                                            <td class="text-center">${txtStatus}</td>
                                        </tr>`;
                                    });

    htmlContent += `
                                    </tbody>
                                </table>
                            </div>

                        </div>
                    </body>
                    </html>`;

                    printWindow.document.write(htmlContent);
                    printWindow.document.close();

                    setTimeout(() => {
                        printWindow.print();
                    }, 500);
                },

                totalMasuk() { 
                    return this.filteredMembers().reduce((sum, item) => sum + (item.lunas ? item.uangMasuk : 0), 0); 
                },
                totalBelum() {
                    return this.filteredMembers().reduce((sum, item) => sum + (item.lunas ? 0 : item.tagihan - item.uangMasuk), 0);
                },
                totalTarget() { 
                    return this.filteredMembers().reduce((sum, item) => sum + item.tagihan, 0); 
                },
                countBelum() { 
                    return this.activeBills.filter(m => (m.riwayatBulan[this.selectedMonth] || 0) < m.tagihan).length; 
                },
                formatRupiah(angka) { return 'Rp ' + angka.toLocaleString('id-ID'); }
            }
        }
    </script>
</body>
</html>
